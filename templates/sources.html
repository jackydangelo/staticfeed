<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonti Monitorate - {{ page_title }}</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <h1>{{ page_title }}</h1>
    
    <div class="meta">
        <a href="index.html">Torna alla homepage</a>
        <span>•</span> 
        Configurazione aggiornata al: {{ updated_at }}
    </div>

    <div class="sources-card">
        <h2>Fonti e Parole Chiave Monitorate</h2>
        
        <div class="table-responsive">
            <table class="sources-table">
                <thead>
                    <tr>
                        <th>Parola Chiave</th>
                        <th>Sorgente</th>
                        <th>URL del Feed</th>
                    </tr>
                </thead>
                <tbody>
                    {% for source in sources %}
                    <tr>
                        <td><span class="keyword-badge">{{ source.keyword }}</span></td>
                        <td><strong>{{ source.label }}</strong></td>
                        <td><a href="{{ source.url }}" target="_blank">{{ source.url }}</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        {{ footer_text }}
    </div>

</body>
</html>
