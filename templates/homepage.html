<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>

    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <h1>🎮 {{ page_title }}</h1>

    <p>
        Ultimo aggiornamento: {{ updated_at }}
    </p>

    {% for article in articles %}

    <div class="article">

        <div class="meta">
            <strong>Fonte:</strong> {{ article.source }} |
            <strong>Data:</strong> {{ article.published }}
        </div>

        <h2>
            <a href="{{ article.link }}" target="_blank">
                {{ article.title }}
            </a>
        </h2>

        <div class="summary">
            {{ article.summary | safe }}
        </div>

    </div>

    {% endfor %}

    <div class="footer">
        {{ footer_text }}
    </div>

</body>
</html>
