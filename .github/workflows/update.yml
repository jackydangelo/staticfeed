name: Update RSS HTML

on:
  schedule:
    - cron: "0 7 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache RSS Feed Data
        uses: actions/cache@v5
        with:
          path: feed_cache.json
          # Usa l'hash di config.py (se cambi i feed la cache si resetta) e l'ID del run corrente
          key: rss-cache-${{ hashFiles('config.py') }}-${{ github.run_id }}
          # Se non c'è una cache esatta per questo run, ripristina l'ultima disponibile per questa configurazione
          restore-keys: |
            rss-cache-${{ hashFiles('config.py') }}-
            rss-cache-

      - name: Generate HTML
        run: |
          python app.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/index.html docs/rss.xml docs/sources.html

          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto update RSS"
            git push
          )
